apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
spec:
  project: infra
  destination:
    namespace: kube-prometheus-stack
    server: https://kubernetes.default.svc
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
  sources:
    - path: .
      repoURL: "oci://ghcr.io/prometheus-community/charts/kube-prometheus-stack"
      targetRevision: 86.1.1
      helm:
        valueFiles:
          - $values/values/kube-prometheus-stack.yaml
    - repoURL: "https://github.com/miglis/k3s-gitops.git"
      targetRevision: main
      ref: values
      path: resources/kube-prometheus-stack
