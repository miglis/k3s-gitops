apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: app-of-apps
  namespace: argo-cd
spec:
  destination:
    namespace: argocd
    server: https://kubernetes.default.svc
  project: default
  syncPolicy:
    automated:
      enabled: true
  source:
    repoURL: "https://github.com/miglis/k3s-gitops.git"
    path: bootstrap
    directory:
      recurse: true
